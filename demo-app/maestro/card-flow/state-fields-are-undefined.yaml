name: the pan, expiry date and CVC should be undefined
appId: com.worldpay.access.checkout.reactnative.demo

---
- runFlow:
    label: "Given I have started the application"
    file: "./before-each/launch-app.yaml"
- runScript:
    label: "When the application finishes loading"
    file: "../utils/print-label.js"
- runScript:
    label: "Then the pan, expiry date and CVC fields should be undefined"
    file: "../utils/get-value-from-hidden-field.js"
- assertTrue: ${output.result === maestro.copiedText}
