name: when user enters a valid expiry date, should mark the expiry date as valid
appId: com.worldpay.access.checkout.reactnative.demo

---
- runFlow:
    label: "Given I have started the application"
    file: "../before-each/launch-app.yaml"
- runFlow:
    label: "When I enter valid expiry date"
    file: "../before-each/enter-valid-expiry-date.yaml"
- copyTextFrom:
    id: "cardFlowE2eStates.expiryDateIsValid"
- assertTrue:
    label: Then the expiry date should be marked as valid
    condition: ${'true' === maestro.copiedText}
